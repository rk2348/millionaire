<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン大富豪</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            background: #2E8B57; color: white; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 10px; overflow: hidden;
        }
        .screen { display: none; }
        .active { display: block; }
        input, button { 
            font-size: 16px; padding: 8px; margin: 5px; 
            border-radius: 5px; border: none; 
        }
        button { background-color: #333; color: white; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background-color: #555; }
        button:disabled { background-color: #555; opacity: 0.5; cursor: not-allowed; }
        
        .lobby-box {
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; 
            max-width: 400px; margin: 20px auto;
        }
        .player-list-item {
            background: rgba(255,255,255,0.1); margin: 5px 0; padding: 10px;
            border-radius: 5px; font-weight: bold; letter-spacing: 1px;
            user-select: none; /* テキスト選択を防ぐ（連打しやすくするため） */
        }

        .card { 
            display: inline-block; background: white; color: black; 
            width: 50px; height: 70px; line-height: 70px;
            margin: 5px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; font-size: 18px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.1s, border 0.1s;
            user-select: none;
        }
        .card:hover { transform: translateY(-5px); }
        .card.selected { border: 3px solid #ffcc00; transform: translateY(-10px); }
        
        .player-box { 
            border: 2px dashed rgba(255,255,255,0.5); padding: 10px; margin: 5px; 
            display: inline-block; border-radius: 8px;
            background-color: rgba(0,0,0,0.2); cursor: crosshair; transition: 0.3s;
            user-select: none;
        }
        .active-turn { border-color: #ffcc00; background-color: rgba(255, 204, 0, 0.2); transform: scale(1.05); }
        
        /* --- ハックメニュー（いかさま） --- */
        #cheat-menu { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #111; 
            padding: 25px; border: 2px solid #9400D3; border-radius: 10px;
            z-index: 100; box-shadow: 0 0 30px rgba(148, 0, 211, 0.8);
            color: #E6E6FA; text-align: left;
        }
        .cheat-btn { background-color: #4B0082; width: 100%; margin: 5px 0; font-weight: bold; }
        .cheat-btn:hover { background-color: #800080; }
        
        .action-area { margin: 15px 0; }
        #message-area { height: 24px; color: #ffcc00; font-weight: bold; }
        .name-input-group { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin-bottom: 20px; }

        #result-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        @keyframes winAnim { 0% { transform: scale(0.5) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes loseAnim { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
        .win-text { color: #FFD700; text-shadow: 0 0 20px #FF8C00; font-size: 64px; margin: 0 0 10px 0; animation: winAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .lose-text { color: #708090; text-shadow: 0 0 10px #000; font-size: 50px; margin: 0 0 10px 0; animation: loseAnim 1.5s ease-out forwards; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>🃏 オンライン大富豪</h1>
        <div class="lobby-box">
            <div class="name-input-group">
                👤 あなたの名前:<br>
                <input type="text" id="player-name" placeholder="未入力で自動設定" maxlength="10" style="text-align: center;">
            </div>
            <h3>👑 ホスト（部屋を作る）</h3>
            <button onclick="createRoom()" style="background-color: #4CAF50; font-weight: bold;">部屋を作る</button>
            <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.2);">
            <h3>👤 ゲスト（部屋に入る）</h3>
            <input type="text" id="join-room-id" placeholder="5桁のルームIDを入力" style="text-transform: uppercase; text-align: center;">
            <br>
            <button onclick="joinRoom()">部屋に入る</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>🚪 待機ルーム</h2>
        <div style="font-size: 18px; margin-bottom: 20px;">
            ルームID: <b id="lobby-room-id" style="font-size: 40px; color: #ffcc00; letter-spacing: 4px; display: block; margin-top: 10px;">----</b>
            <span id="lobby-id-hint" style="font-size: 12px; color: #ccc;">このIDを教えてください</span>
        </div>
        
        <div class="lobby-box">
            <h3>参加者一覧（<span id="player-count">1</span>人）</h3>
            <div id="lobby-players"></div>
        </div>

        <div style="margin-top: 20px; height: 60px;">
            <button id="btn-start-game" onclick="startGame()" style="display:none; background-color:#ffcc00; color:#000; font-size: 18px; font-weight:bold; padding: 10px 30px;" disabled>2人以上で開始可能</button>
            <div id="waiting-msg" style="color: #ccc; font-weight: bold; display: none;">ホストが開始するのを待っています...</div>
        </div>
        <div style="margin-top: 30px;"><button onclick="leaveRoom()" style="background-color: #777; padding: 8px 20px;">🔙 タイトルに戻る</button></div>
    </div>

    <div id="game-screen" class="screen">
        <!-- 名前をクリックでいかさまメニュー展開 -->
        <div>あなたの名前: <b id="my-name-display" onclick="openCheatMenu()" title="クリックで..." style="cursor: pointer; text-decoration: underline;"></b> <span id="my-status"></span></div>
        <div id="message-area"></div>
        <hr style="border-color: rgba(255,255,255,0.2);">
        
        <div id="opponents"></div> 
        
        <hr style="border-color: rgba(255,255,255,0.2);">
        <div style="height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="font-size: 14px; color: #aaa;">現在の場</div>
            <div id="table" style="font-size: 20px; min-height: 80px; display: flex; align-items: center;">場にカードはありません</div>
        </div>
        <hr style="border-color: rgba(255,255,255,0.2);">
        
        <div class="action-area">
            <button id="btn-play" onclick="submitPlay()" disabled>選択したカードを出す</button>
            <button id="btn-pass" onclick="submitPass()" disabled>パス</button>
            <button onclick="clearSelection()">選択解除</button>
        </div>
        <div id="my-hand"></div> 
    </div>

    <!-- リザルト -->
    <div id="result-overlay">
        <h1 id="result-title"></h1>
        <h3 id="result-subtitle" style="color: #ddd; font-size: 24px; margin-bottom: 40px; font-weight: normal;"></h3>
        <div>
            <button onclick="playAgain()" style="background-color: #4CAF50; font-size: 20px; padding: 12px 30px; margin: 10px; font-weight: bold;">🔄 もう一度遊ぶ</button>
            <button onclick="leaveRoom()" style="background-color: #666; font-size: 20px; padding: 12px 30px; margin: 10px;">🏠 タイトルに戻る</button>
        </div>
    </div>

    <!-- 裏メニュー（いかさま用） -->
    <div id="cheat-menu">
        <h3 style="margin-top:0; color: #ff44ff; border-bottom: 1px solid #ff44ff; padding-bottom: 5px;">👁️ SYSTEM OVERRIDE</h3>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">※相手のプレイヤー枠ダブルクリックで手札透視</p>
        
        <div>
            <input type="text" id="cheat-val" placeholder="捏造する文字 (例: ♠A)" style="width: 140px; margin-right: 5px; color: #000;">
            <button class="cheat-btn" onclick="sendCheatFake()" style="width: auto;">🃏 強制出陣</button>
        </div>
        <button class="cheat-btn" onclick="sendCheatBomb()" style="margin-top: 15px;">💣 場を爆破してターン強奪</button>
        
        <div style="text-align: right; margin-top: 20px;">
            <button onclick="document.getElementById('cheat-menu').style.display='none'" style="background: transparent; border: 1px solid #777; color: #ccc;">閉じる</button>
        </div>
    </div>

    <script>
        let peer; let connections = []; let myConnection; let isHost = false;
        let myId = ""; let myName = ""; let selectedCards = []; 

        // いかさま用の状態管理
        let cheatClickCount = 0;
        let isCheatMode = false;

        const RANK_MAP = { '3':1, '4':2, '5':3, '6':4, '7':5, '8':6, '9':7, '10':8, 'J':9, 'Q':10, 'K':11, 'A':12, '2':13, 'Joker':14 };
        const SUITS = ['♠', '♥', '♦', '♣'];

        let gameState = { isStarted: false, isFinished: false, winnerId: null, players: {}, turnOrder: [], currentTurnIdx: 0, tableCards: [], lastPlayedId: null, message: "" };

        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('daifugo_playerName');
            if (savedName) document.getElementById('player-name').value = savedName;
        });

        function getPlayerName() {
            let name = document.getElementById('player-name').value.trim();
            if (!name) name = 'Player_' + Math.floor(Math.random() * 10000);
            localStorage.setItem('daifugo_playerName', name);
            return name;
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function leaveRoom() {
            if (peer) { peer.destroy(); peer = null; }
            isHost = false; myConnection = null; connections = [];
            isCheatMode = false; cheatClickCount = 0; // いかさま状態リセット
            gameState = { isStarted: false, isFinished: false, winnerId: null, players: {}, turnOrder: [], currentTurnIdx: 0, tableCards: [], lastPlayedId: null, message: "" };
            
            document.getElementById('btn-start-game').style.display = 'none';
            document.getElementById('waiting-msg').style.display = 'none';
            document.getElementById('lobby-id-hint').style.display = 'inline';
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('cheat-menu').style.display = 'none';
            
            switchScreen('setup-screen');
        }

        // ==========================================
        // いかさま解除ロジック (ロビーで名前を9回クリック)
        // ==========================================
        function handleSelfClick() {
            if (isCheatMode) return;
            cheatClickCount++;
            if (cheatClickCount === 9) {
                isCheatMode = true;
                alert("⚠️ SYSTEM HACKED ⚠️\n悪魔の契約が結ばれました。\n\n【解放された能力】\n1. 相手の枠をダブルクリックで「手札透視」\n2. ゲーム中、自分の名前をクリックで「裏メニュー」");
            }
        }

        // ==========================================
        // 通信セットアップ
        // ==========================================
        function createRoom() {
            myName = getPlayerName();
            const shortId = Math.random().toString(36).substring(2, 7).toUpperCase();
            switchScreen('lobby-screen');
            document.getElementById('lobby-room-id').innerText = "接続中...";
            
            isHost = true; peer = new Peer(shortId);
            peer.on('error', (err) => { alert(`通信エラー`); leaveRoom(); });
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('lobby-room-id').innerText = id;
                document.getElementById('btn-start-game').style.display = 'inline-block';
                gameState.players[myId] = { name: myName, hand: [], isPass: false };
                updateLobbyUI();
            });
            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => handleGuestRequest(data, conn));
                conn.on('close', () => {
                    delete gameState.players[conn.peer];
                    connections = connections.filter(c => c.peer !== conn.peer);
                    updateLobbyUI(); 
                    if(gameState.isStarted && !gameState.isFinished) broadcastState(); 
                });
            });
        }

        function joinRoom() {
            const roomId = document.getElementById('join-room-id').value.trim().toUpperCase();
            if (!roomId) return alert("IDを入力してください");
            myName = getPlayerName(); peer = new Peer();

            peer.on('error', (err) => { alert("部屋が見つかりません。"); leaveRoom(); });
            peer.on('open', (id) => {
                myId = id; myConnection = peer.connect(roomId);
                myConnection.on('open', () => {
                    switchScreen('lobby-screen');
                    document.getElementById('lobby-room-id').innerText = roomId;
                    document.getElementById('lobby-id-hint').style.display = 'none';
                    document.getElementById('waiting-msg').style.display = 'block';
                    myConnection.send({ type: 'join', name: myName });
                });
                myConnection.on('data', (data) => {
                    // 通信データの振り分け
                    if (data.type === 'lobby_update') {
                        gameState.players = data.players; // クライアント側でもプレイヤーリストを保持
                        renderLobbyPlayers();
                    }
                    else if (data.type === 'game_start') {
                        document.getElementById('result-overlay').style.display = 'none';
                        switchScreen('game-screen');
                    }
                    else if (data.type === 'update') updateGameUI(data.state);
                    else if (data.type === 'peek_result') alert(`👁️ 【透視完了】\n対象の手札:\n${data.hand}`);
                });
                myConnection.on('close', () => { alert("ホストとの接続が切断されました。"); leaveRoom(); });
            });
        }

        function updateLobbyUI() {
            renderLobbyPlayers();
            connections.forEach(conn => conn.send({ type: 'lobby_update', players: gameState.players }));
        }

        function renderLobbyPlayers() {
            const playersArr = Object.entries(gameState.players);
            document.getElementById('player-count').innerText = playersArr.length;
            const listDiv = document.getElementById('lobby-players');
            
            listDiv.innerHTML = playersArr.map(([id, p]) => {
                // 自分の名前だった場合のみクリックイベント（いかさまトリガー）を付与
                const clickAttr = (id === myId) ? `onclick="handleSelfClick()"` : '';
                return `<div class="player-list-item" ${clickAttr}>👤 ${p.name}</div>`;
            }).join('');
            
            if (isHost) {
                const btn = document.getElementById('btn-start-game');
                if (playersArr.length >= 2) { btn.disabled = false; btn.innerText = "ゲームを開始する"; } 
                else { btn.disabled = true; btn.innerText = "2人以上で開始可能"; }
            }
        }

        // ==========================================
        // ゲームロジック (ホスト側)
        // ==========================================
        function startGame() {
            if(!isHost) return;
            if(Object.keys(gameState.players).length < 2) { alert("参加者が2人以上必要です。"); return; }

            let deck = [];
            for (let s of SUITS) { for (let v in RANK_MAP) { if (v !== 'Joker') deck.push({ suit: s, value: v, rank: RANK_MAP[v], display: s+v }); } }
            deck.push({ suit: '🃏', value: 'Joker', rank: RANK_MAP['Joker'], display: 'Joker' });
            deck.push({ suit: '🃏', value: 'Joker', rank: RANK_MAP['Joker'], display: 'Joker' });

            for(let i = deck.length - 1; i > 0; i--){
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            gameState.turnOrder = Object.keys(gameState.players);
            gameState.currentTurnIdx = 0; gameState.tableCards = []; gameState.lastPlayedId = null;
            gameState.isStarted = true; gameState.isFinished = false; gameState.winnerId = null; 
            gameState.message = "ゲーム開始！";

            for(let id of gameState.turnOrder) { gameState.players[id].hand = []; gameState.players[id].isPass = false; }
            let pIdx = 0;
            while(deck.length > 0) {
                gameState.players[gameState.turnOrder[pIdx]].hand.push(deck.pop());
                pIdx = (pIdx + 1) % gameState.turnOrder.length;
            }
            for(let id of gameState.turnOrder) gameState.players[id].hand.sort((a,b) => a.rank - b.rank);

            document.getElementById('result-overlay').style.display = 'none';
            connections.forEach(conn => conn.send({ type: 'game_start' }));
            switchScreen('game-screen'); broadcastState();
        }

        function handleGuestRequest(data, conn) {
            const playerId = conn.peer;
            if (data.type === 'join') { gameState.players[playerId] = { name: data.name, hand: [], isPass: false }; updateLobbyUI(); return; }
            
            const player = gameState.players[playerId]; if (!player) return;

            // 通常アクション
            if (data.type === 'play') processPlay(playerId, data.cardIndices);
            else if (data.type === 'pass') processPass(playerId);
            
            // いかさまアクション (ホストは受け入れて処理する)
            else if (data.type === 'cheat_peek') {
                const targetHand = gameState.players[data.targetId]?.hand.map(c=>c.display) || [];
                conn.send({ type: 'peek_result', hand: targetHand.join(' / ') });
            }
            else if (data.type === 'cheat_fake') {
                if (player.hand.length > 0) player.hand.splice(Math.floor(Math.random() * player.hand.length), 1);
                gameState.tableCards = [{ suit: '?', value: '?', rank: 0, display: data.cardDisplay }];
                gameState.lastPlayedId = playerId;
                gameState.message = `⚠️ ${player.name}が謎のカードを出しました`;
                for(let id in gameState.players) gameState.players[id].isPass = false;
                checkWinCondition(player, playerId);
            }
            else if (data.type === 'cheat_bomb') {
                gameState.tableCards = []; // 場を消し飛ばす
                gameState.lastPlayedId = null;
                // 強制的にターンを奪った人の順番に変更する
                gameState.currentTurnIdx = gameState.turnOrder.indexOf(playerId);
                for(let id in gameState.players) gameState.players[id].isPass = false;
                gameState.message = `💣 ${player.name} が場を爆破し、ターンを奪いました！`;
                broadcastState();
            }
        }

        function checkWinCondition(player, playerId) {
            if (player.hand.length === 0) {
                gameState.message = `🎉 ${player.name} が上がりました！`;
                gameState.isFinished = true; gameState.winnerId = playerId;
                broadcastState(); 
            } else { advanceTurn(); }
        }

        function processPlay(playerId, indices) {
            if (gameState.turnOrder[gameState.currentTurnIdx] !== playerId) return; 
            const player = gameState.players[playerId]; const playedCards = indices.map(i => player.hand[i]);
            if (playedCards.length === 0) return;
            const isSameValue = playedCards.every(c => c.value === playedCards[0].value || c.value === 'Joker');
            if(!isSameValue) return; 

            if (gameState.tableCards.length > 0) {
                if (playedCards.length !== gameState.tableCards.length) return;
                if (playedCards[0].rank <= gameState.tableCards[0].rank) return;
            }

            indices.sort((a,b)=>b-a).forEach(i => player.hand.splice(i, 1));
            gameState.tableCards = playedCards; gameState.lastPlayedId = playerId;
            for(let id in gameState.players) gameState.players[id].isPass = false;
            gameState.message = `${player.name}がカードを出しました`;
            checkWinCondition(player, playerId);
        }

        function processPass(playerId) {
            if (gameState.turnOrder[gameState.currentTurnIdx] !== playerId) return;
            gameState.players[playerId].isPass = true;
            gameState.message = `${gameState.players[playerId].name}がパスしました`;
            advanceTurn();
        }

        function advanceTurn() {
            let nextIdx = gameState.currentTurnIdx; let loopCount = 0;
            do {
                nextIdx = (nextIdx + 1) % gameState.turnOrder.length; loopCount++;
                if (gameState.turnOrder[nextIdx] === gameState.lastPlayedId) {
                    gameState.tableCards = []; gameState.message = "場が流れました";
                    for(let id in gameState.players) gameState.players[id].isPass = false;
                    break; 
                }
            } while (gameState.players[gameState.turnOrder[nextIdx]].isPass && loopCount < gameState.turnOrder.length);
            gameState.currentTurnIdx = nextIdx; broadcastState();
        }

        function broadcastState() {
            updateGameUI(gameState); connections.forEach(conn => conn.send({ type: 'update', state: gameState }));
        }

        // ==========================================
        // UI操作・リザルト演出
        // ==========================================
        function updateGameUI(state) {
            gameState = state; 
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('message-area').innerText = state.message;
            
            if (state.isFinished) showResultOverlay(state.winnerId);
            else document.getElementById('result-overlay').style.display = 'none';

            const currentTurnId = state.turnOrder[state.currentTurnIdx];
            const isMyTurn = (currentTurnId === myId) && state.isStarted && !state.isFinished;

            document.getElementById('btn-play').disabled = !isMyTurn;
            document.getElementById('btn-pass').disabled = !isMyTurn;
            if(isMyTurn && state.tableCards.length === 0) document.getElementById('btn-pass').disabled = true; 
            document.getElementById('my-status').innerText = isMyTurn ? "（🎯 あなたのターン！）" : "";

            const tableDiv = document.getElementById('table');
            if (state.tableCards.length > 0) tableDiv.innerHTML = state.tableCards.map(c => renderCardHTML(c, false)).join('');
            else tableDiv.innerText = "場にカードはありません";

            const oppDiv = document.getElementById('opponents'); oppDiv.innerHTML = '';
            for (let id in state.players) {
                if (id !== myId) {
                    const p = state.players[id];
                    const activeClass = (id === currentTurnId && !state.isFinished) ? 'active-turn' : '';
                    const passText = p.isPass ? '<br><span style="color:gray;">(パス)</span>' : '';
                    // 相手の枠にダブルクリックイベントを設定（いかさまモード時のみ機能する）
                    oppDiv.innerHTML += `
                        <div class="player-box ${activeClass}" ondblclick="requestPeek('${id}')">
                            ${p.name} <br> 🃏 ${p.hand ? p.hand.length : 0}枚 ${passText}
                        </div>`;
                }
            }
            renderMyHand();
        }

        function showResultOverlay(winnerId) {
            const overlay = document.getElementById('result-overlay');
            const title = document.getElementById('result-title');
            const subtitle = document.getElementById('result-subtitle');
            overlay.style.display = 'flex';
            if (winnerId === myId) {
                title.className = 'win-text'; title.innerText = "👑 WINNER 👑"; subtitle.innerText = "お見事！あなたの勝利です！";
            } else {
                title.className = 'lose-text'; title.innerText = "💀 LOSE...";
                const winnerName = gameState.players[winnerId]?.name || "誰か"; subtitle.innerText = `${winnerName} があがりました`;
            }
        }

        function playAgain() {
            document.getElementById('result-overlay').style.display = 'none'; switchScreen('lobby-screen'); 
            if (!isHost) document.getElementById('waiting-msg').style.display = 'block'; 
        }

        function renderCardHTML(card, isSelectable, index = -1) {
            const colorStyle = (card.suit === '♥' || card.suit === '♦') ? 'color: red;' : '';
            const selectClass = selectedCards.includes(index) ? 'selected' : '';
            const clickAttr = (isSelectable && !gameState.isFinished) ? `onclick="toggleSelect(${index})"` : '';
            return `<div class="card ${selectClass}" style="${colorStyle}" ${clickAttr}>${card.display}</div>`;
        }

        function renderMyHand() {
            const handDiv = document.getElementById('my-hand');
            const myHand = gameState.players[myId]?.hand || [];
            handDiv.innerHTML = myHand.map((c, idx) => renderCardHTML(c, true, idx)).join('');
        }

        function toggleSelect(index) {
            const pos = selectedCards.indexOf(index);
            if(pos === -1) selectedCards.push(index); else selectedCards.splice(pos, 1);
            renderMyHand(); 
        }
        function clearSelection() { selectedCards = []; renderMyHand(); }

        function submitPlay() {
            if(selectedCards.length === 0) return alert("カードを選択してください");
            const myHand = gameState.players[myId].hand; const rank = myHand[selectedCards[0]].rank;
            const isSame = selectedCards.every(i => myHand[i].value === myHand[selectedCards[0]].value || myHand[i].value === 'Joker');
            if(!isSame) return alert("同じ数字のカードを選択してください");
            if(gameState.tableCards.length > 0) {
                if(selectedCards.length !== gameState.tableCards.length) return alert("場と同じ枚数を出してください");
                if(rank <= gameState.tableCards[0].rank) return alert("場より強いカードを出してください");
            }
            if (isHost) processPlay(myId, selectedCards); else myConnection.send({ type: 'play', cardIndices: selectedCards });
            clearSelection();
        }

        function submitPass() {
            if (isHost) processPass(myId); else myConnection.send({ type: 'pass' });
            clearSelection();
        }

        // ==========================================
        // クライアント側発信のいかさまアクション
        // ==========================================
        function requestPeek(targetId) {
            if (!isCheatMode || !gameState.isStarted || gameState.isFinished) return;
            if (isHost) {
                const targetHand = gameState.players[targetId]?.hand.map(c=>c.display) || [];
                alert(`👁️ 【透視完了】\n対象の手札:\n${targetHand.join(' / ')}`);
            } else {
                myConnection.send({ type: 'cheat_peek', targetId: targetId });
            }
        }

        function openCheatMenu() {
            if (!isCheatMode || !gameState.isStarted || gameState.isFinished) return;
            document.getElementById('cheat-menu').style.display = 'block';
        }

        function sendCheatFake() {
            const val = document.getElementById('cheat-val').value.trim();
            if(!val) return alert("カード名を入力してください");
            
            if (isHost) handleGuestRequest({ type: 'cheat_fake', cardDisplay: val }, { peer: myId });
            else myConnection.send({ type: 'cheat_fake', cardDisplay: val });
            
            document.getElementById('cheat-val').value = '';
            document.getElementById('cheat-menu').style.display = 'none';
        }

        function sendCheatBomb() {
            if (isHost) handleGuestRequest({ type: 'cheat_bomb' }, { peer: myId });
            else myConnection.send({ type: 'cheat_bomb' });
            
            document.getElementById('cheat-menu').style.display = 'none';
        }
    </script>
</body>
</html>
